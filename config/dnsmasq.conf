# Main dnsmasq configuration.
#
# You may edit this file, but most day-to-day changes should go in:
#
#   config/upstream.conf        upstream DNS resolvers
#   config/local.conf           manual blocks/overrides
#   config/blocklist-urls.txt   downloaded blocklist sources
#
# After editing this file, restart the service:
#
#   docker compose restart dnsmasq-adblock

# Run in foreground for Docker.
no-daemon

# Log to stdout/stderr so logs are visible through:
#
#   docker logs dnsmasq-adblock
log-facility=-

# Listen on all container interfaces.
#
# Host exposure is controlled by docker-compose.yml port bindings.
# Listen on all container interfaces.
interface=lo
interface=eth0
bind-interfaces

# Do not use the container's /etc/resolv.conf.
#
# Upstream resolvers are configured explicitly in upstream.conf.
no-resolv

# Host-editable upstream resolver config.
conf-file=/etc/dnsmasq.d/upstream.conf

# Basic DNS hygiene.
#
# domain-needed:
#   Do not forward plain names without dots.
#
# bogus-priv:
#   Do not forward reverse lookups for private IP ranges upstream.
#
# stop-dns-rebind:
#   Protect against DNS replies that point public names to private IP ranges.
domain-needed
bogus-priv
stop-dns-rebind

# DNS cache size.
cache-size=10000

# Generated adblock rules.
#
# This file is generated at container startup from blocklist-urls.txt.
# You usually should not edit it manually.
conf-file=/generated/blocklist.conf

# Manual local blocks/overrides.
conf-file=/etc/dnsmasq.d/local.conf