# Generated blocklist rules.
#
# Do not edit this file by hand.
#
# This file is overwritten every time the container starts.
# It is mounted from the host so you can inspect/debug the generated dnsmasq
# rules without entering the container.
#
# To change blocklist sources, create:
#
#   config/blocklist-urls.local.txt
#
# To add manual blocks or overrides, create:
#
#   config/local.conf