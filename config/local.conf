# Manual dnsmasq rules.
#
# You can edit this file.
#
# Use this for local one-off blocks, allow/override rules, or internal names.
# This file is NOT generated by the container.
#
# After editing:
#
#   docker compose restart dnsmasq-adblock

# Manual block examples:
#
# address=/example-ad-domain.com/0.0.0.0
# address=/example-ad-domain.com/::

# Manual upstream override example:
#
# server=/example.com/1.1.1.1

# Local hostname example:
#
# address=/router.home/10.0.0.1