# Upstream DNS resolvers used by dnsmasq after local block rules are applied.
#
# You can edit this file.
#
# Format:
#
#   server=<resolver-ip>
#
# Current defaults:
#
#   1.1.1.1 and 1.0.0.1 are Cloudflare public DNS.
#   9.9.9.9 and 149.112.112.112 are Quad9 malware-blocking public DNS.
#
# If you want Cloudflare only, remove the Quad9 lines.
# If you want Quad9 only, remove the Cloudflare lines.
#
# After editing:
#
#   docker compose restart dnsmasq-adblock

server=1.1.1.1
server=1.0.0.1
server=9.9.9.9
server=149.112.112.112